<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- google font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- tailwind and daisyUI link-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>GitHub Issue Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <style>
        * {
            font-family: "Geist", sans-serif;
            font-optical-sizing: auto;

        }
    </style>
</head>

<body class="bg-[#F8FAFC]">
    <!-- login page here -->
    <section class="login-page max-w-[540px] mx-auto bg-white shadow-xl py-3">
        <!-- image and others -->
        <div class="img-and-text text-center ">
            <img src="./assets/github-logo.png" alt="" class="mx-auto my-3">
            <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
            <p>Sign in to manage your issues</p>
        </div>

        <!-- login form -->
        <div class="p-4 ">
            <fieldset class="fieldset bg-white border-base-100 mx-auto rounded-box w-full border p-4">
             

                <label class="label">Username</label>
                <input type="text" class="input w-full" placeholder="Enter Username" id="username"/>

                <label class="label">Password</label>
                <input type="password" class="input w-full" placeholder="Enrter password" id="password"/>

                <button class="btn btn-primary mt-4">Sign in</button>
            </fieldset>
        </div>
    </section>



</body>

</html>
