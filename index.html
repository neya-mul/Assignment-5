<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- google font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- tailwind and daisyUI link-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome link  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />


    <title>GitHub Issue Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <style>
        * {
            font-family: "Geist", sans-serif;
            font-optical-sizing: auto;

        }
    </style>
</head>

<body class="bg-[#F8FAFC]">
    <!-- login page here -->
    <section class="login-page max-w-[540px] mx-auto bg-white shadow-xl py-3 my-2" id="login-page">
        <!-- image and others -->
        <div class="img-and-text text-center ">
            <img src="./assets/github-logo.png" alt="" class="mx-auto my-3">
            <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
            <p>Sign in to manage your issues</p>
        </div>

        <!-- login form -->
        <div class="p-4 ">
            <fieldset class="fieldset bg-white border-base-100 mx-auto rounded-box w-full border p-4">
                <label class="label">Username</label>
                <input type="text" class="input w-full" placeholder="Enter Username" id="username" />

                <label class="label">Password</label>
                <input type="password" class="input w-full" placeholder="Enrter password" id="password" />

                <button class="btn btn-primary mt-4" id="login-btn">Sign in</button>
            </fieldset>
        </div>
    </section>

    <!-- all cards section -->
    <section class=" max-w-[1600px] mx-auto" id="all-elements">




        <!-- navbar -->
        <nav class="bg-white p-3  shadow md:flex justify-between">
            <div class="md:flex gap-1 items-center">
                <img src="./assets/github-logo.png" alt="" class="w-10 mx-auto">
                <p class="text-2xl text-center">GitHub Issues Tracker</p>
            </div>

            <div class=" text-center">
                <input type="text" placeholder="Search Issues..." class="border border-gray-200 p-1.5 mx-auto"
                    id="search-input">
                <button class="btn btn-primary mx-auto" id="search-btn">Search</button>
            </div>

        </nav>



        <!-- all button section -->
        <div class="bg-white my-3 md:flex gap-3 text-center md:text-left p-3" id="all-buttons">
            <button class="btn btn-primary px-4 py-2">All</button>
            <button class="btn px-4 py-2">Open</button>
            <button class="btn px-4 py-2">Close</button>
        </div>

<!--  -->
        <div>

        </div>

    </section>


    <script src="./script.js"></script>
</body>

</html>
